<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #5a6fd1;
        }

        .message {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }

        .error {
            background: #ffdede;
            color: #b00020;
            border: 1px solid #ffb3b3;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            text-decoration: none;
            color: #667eea;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Change Password</h2>

    <!-- Error Message -->
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <!-- Success Message -->
    <div th:if="${success}" class="message success" th:text="${success}"></div>

    <form th:action="@{/change-password}" method="post">

        <div class="input-group">
            <label for="currentPassword">Current Password</label>
            <input type="password"
                   id="currentPassword"
                   name="currentPassword"
                   placeholder="Enter your current password"
                   required>
        </div>

        <div class="input-group">
            <label for="newPassword">New Password</label>
            <input type="password"
                   id="newPassword"
                   name="newPassword"
                   placeholder="Enter new password"
                   required
                   minlength="8"
                   maxlength="128">
        </div>

        <div class="input-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password"
                   id="confirmPassword"
                   name="confirmPassword"
                   placeholder="Re-enter new password"
                   required
                   minlength="8"
                   maxlength="128">
        </div>

        <button type="submit">Update Password</button>

    </form>

    <div class="links">
        <a th:href="@{/dashboard}">Back to Dashboard</a>
    </div>

</div>

</body>
</html>
