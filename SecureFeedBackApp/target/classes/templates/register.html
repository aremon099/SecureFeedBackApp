<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; padding: 40px 20px; position: relative;
        }
        .stars { position: fixed; width: 100%; height: 100%; z-index: 1; }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .mountains { position: fixed; bottom: 0; width: 100%; height: 40%; z-index: 1; }
        .register-container {
            position: relative; z-index: 10; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px); border-radius: 20px; padding: 50px 40px;
            width: 500px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h2 { color: white; text-align: center; font-size: 42px; margin-bottom: 10px; font-weight: 600; }
        .subtitle { color: rgba(255,255,255,0.9); text-align: center; font-size: 15px; margin-bottom: 30px; }
        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group label { display: block; color: white; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .input-group input {
            width: 100%; padding: 13px 40px 13px 18px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px; background: rgba(255,255,255,0.1); color: white;
            font-size: 15px; transition: all 0.3s;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.6); }
        .input-group input:focus { outline: none; border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
        .input-icon { position: absolute; right: 18px; bottom: 13px; color: rgba(255,255,255,0.7); font-size: 16px; }
        .password-strength { margin-top: 8px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; display: none; }
        .password-strength-bar { height: 100%; width: 0%; transition: all 0.3s; }
        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }
        .password-match { font-size: 12px; margin-top: 5px; color: rgba(255,255,255,0.8); display: none; }
        .match-success { color: #bbf7d0; display: block; }
        .match-error { color: #fecaca; display: block; }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 50px; background: white;
            color: #667eea; font-size: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .login-link { text-align: center; margin-top: 25px; color: white; font-size: 15px; }
        .login-link a { color: white; font-weight: 600; text-decoration: none; border-bottom: 2px solid white; }
        .message { text-align: center; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        .error { background: rgba(239,68,68,0.2); color: #fecaca; border: 1px solid rgba(239,68,68,0.3); }
        .success { background: rgba(34,197,94,0.2); color: #bbf7d0; border: 1px solid rgba(34,197,94,0.3); }
        @media (max-width: 480px) {
            .register-container { width: 95%; padding: 40px 25px; }
            h2 { font-size: 32px; }
            .name-row { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star" style="top:10%;left:20%;animation-delay:0s"></div>
        <div class="star" style="top:20%;left:80%;animation-delay:1s"></div>
        <div class="star" style="top:30%;left:50%;animation-delay:2s"></div>
        <div class="star" style="top:40%;left:30%;animation-delay:1.5s"></div>
        <div class="star" style="top:50%;left:60%;animation-delay:2.5s"></div>
    </div>
    <div class="register-container">
        <h2>Register</h2>
        <p class="subtitle">Create your account to get started</p>
        <div th:if="${error}" class="message error" th:text="${error}"></div>
        <div th:if="${success}" class="message success" th:text="${success}"></div>
        <form th:action="@{/register}" method="post" id="registerForm">
            <!-- CWE-120: maxlength on all inputs -->
            <div class="name-row">
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="John" required maxlength="50">
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Doe" required maxlength="50">
                    <span class="input-icon">👤</span>
                </div>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john.doe@example.com" required maxlength="100">
                <span class="input-icon">📧</span>
            </div>
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required maxlength="30">
                <span class="input-icon">✨</span>
            </div>
            <!-- CWE-521: Password strength validation -->
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required maxlength="128">
                <span class="input-icon">🔒</span>
                <div class="password-strength" id="passwordStrength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
            </div>
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required maxlength="128">
                <span class="input-icon">🔐</span>
                <div class="password-match" id="passwordMatch"></div>
            </div>
            <button type="submit" id="submitBtn">Create Account</button>
        </form>
        <div class="login-link">Already have an account? <a th:href="@{/login}">Login</a></div>
    </div>
    <script>
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const passwordStrength = document.getElementById('passwordStrength');
        const strengthBar = document.getElementById('strengthBar');
        const passwordMatch = document.getElementById('passwordMatch');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('registerForm');

        password.addEventListener('input', function() {
            const value = this.value;
            if (value.length === 0) { passwordStrength.style.display = 'none'; return; }
            passwordStrength.style.display = 'block';
            let strength = 0;
            if (value.length >= 8) strength++;
            if (/[a-z]/.test(value) && /[A-Z]/.test(value)) strength++;
            if (/[0-9]/.test(value)) strength++;
            if (/[^A-Za-z0-9]/.test(value)) strength++;
            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) strengthBar.classList.add('strength-weak');
            else if (strength === 3) strengthBar.classList.add('strength-medium');
            else strengthBar.classList.add('strength-strong');
            checkPasswordMatch();
        });

        confirmPassword.addEventListener('input', checkPasswordMatch);

        function checkPasswordMatch() {
            const pass = password.value;
            const confirmPass = confirmPassword.value;
            if (confirmPass.length === 0) { passwordMatch.style.display = 'none'; submitBtn.disabled = false; return; }
            if (pass === confirmPass) {
                passwordMatch.textContent = '✓ Passwords match';
                passwordMatch.className = 'password-match match-success';
                submitBtn.disabled = false;
            } else {
                passwordMatch.textContent = '✗ Passwords do not match';
                passwordMatch.className = 'password-match match-error';
                submitBtn.disabled = true;
            }
        }

        form.addEventListener('submit', function(e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault(); alert('Passwords do not match!'); return false;
            }
            if (password.value.length < 8) {
                e.preventDefault(); alert('Password must be at least 8 characters long!'); return false;
            }
        });
    </script>
</body>
</html>
