<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Secure Feedback App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 600px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            color: white;
            text-align: center;
            font-size: 36px;
            margin-bottom: 15px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .welcome-text {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .username {
            color: white;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px 25px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .card-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-description {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .logout-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: rgba(239, 68, 68, 0.2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(239, 68, 68, 0.4);
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 480px) {
            .dashboard-container {
                padding: 40px 25px;
            }

            h2 {
                font-size: 28px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h2>Welcome Back! 👋</h2>
        <p class="welcome-text">
            Hi, <span class="username" th:text="${username}"></span>!
        </p>

        <div class="cards-grid">
            <a th:href="@{/feedback}" class="card">
                <span class="card-icon">📝</span>
                <div class="card-title">Submit Feedback</div>
                <div class="card-description">Share your thoughts with us</div>
            </a>

            <a th:href="@{/change-password}" class="card">
                <span class="card-icon">🔑</span>
                <div class="card-title">Change Password</div>
                <div class="card-description">Update your security credentials</div>
            </a>
        </div>

        <a th:href="@{/logout}" class="logout-btn">🚪 Logout</a>
    </div>
</body>
</html>
