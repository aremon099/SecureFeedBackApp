<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Feedback App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        .stars { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .star {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; animation: twinkle 3s infinite;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .mountains { position: absolute; bottom: 0; width: 100%; height: 40%; }
        .mountain { position: absolute; bottom: 0; width: 0; height: 0; border-style: solid; }
        .mountain-1 {
            left: -10%; border-width: 0 250px 300px 250px;
            border-color: transparent transparent rgba(50, 30, 80, 0.7) transparent;
        }
        .mountain-2 {
            left: 15%; border-width: 0 300px 400px 300px;
            border-color: transparent transparent rgba(60, 40, 90, 0.6) transparent;
        }
        .mountain-3 {
            right: 10%; border-width: 0 280px 350px 280px;
            border-color: transparent transparent rgba(55, 35, 85, 0.65) transparent;
        }
        .tree { position: absolute; bottom: 0; width: 0; height: 0; border-style: solid; }
        .tree-1 { left: 10%; border-width: 0 15px 120px 15px; border-color: transparent transparent rgba(40, 20, 70, 0.8) transparent; }
        .tree-2 { left: 18%; border-width: 0 20px 150px 20px; border-color: transparent transparent rgba(45, 25, 75, 0.8) transparent; }
        .tree-3 { right: 15%; border-width: 0 18px 130px 18px; border-color: transparent transparent rgba(42, 22, 72, 0.8) transparent; }
        .tree-4 { right: 25%; border-width: 0 22px 160px 22px; border-color: transparent transparent rgba(38, 18, 68, 0.8) transparent; }
        .login-container {
            position: relative; z-index: 10; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); border-radius: 20px; padding: 50px 40px; width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h2 {
            color: white; text-align: center; font-size: 48px; margin-bottom: 40px;
            font-weight: 600; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input {
            width: 100%; padding: 15px 45px 15px 20px; border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px; background: rgba(255, 255, 255, 0.1); color: white;
            font-size: 16px; transition: all 0.3s ease;
        }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.7); }
        .input-group input:focus {
            outline: none; border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }
        .input-icon {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7); font-size: 18px;
        }
        .remember-forgot {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; font-size: 14px;
        }
        .remember-me { display: flex; align-items: center; color: white; }
        .remember-me input[type="checkbox"] { margin-right: 8px; width: 16px; height: 16px; }
        .forgot-password { color: white; text-decoration: none; transition: opacity 0.3s; }
        .forgot-password:hover { opacity: 0.8; }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 50px;
            background: white; color: #667eea; font-size: 18px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); }
        button:active { transform: translateY(0); }
        .register-link { text-align: center; margin-top: 25px; color: white; font-size: 15px; }
        .register-link a {
            color: white; font-weight: 600; text-decoration: none;
            border-bottom: 2px solid white; transition: opacity 0.3s;
        }
        .register-link a:hover { opacity: 0.8; }
        .message {
            text-align: center; padding: 12px; border-radius: 10px; margin-bottom: 20px;
            font-size: 14px; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .error {
            background: rgba(239, 68, 68, 0.2); color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .success {
            background: rgba(34, 197, 94, 0.2); color: #bbf7d0;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        @media (max-width: 480px) {
            .login-container { width: 90%; padding: 40px 30px; }
            h2 { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star" style="top:10%;left:20%;animation-delay:0s"></div>
        <div class="star" style="top:20%;left:80%;animation-delay:1s"></div>
        <div class="star" style="top:30%;left:50%;animation-delay:2s"></div>
        <div class="star" style="top:15%;left:70%;animation-delay:0.5s"></div>
        <div class="star" style="top:40%;left:30%;animation-delay:1.5s"></div>
        <div class="star" style="top:50%;left:60%;animation-delay:2.5s"></div>
        <div class="star" style="top:60%;left:25%;animation-delay:0.8s"></div>
        <div class="star" style="top:70%;left:75%;animation-delay:1.8s"></div>
        <div class="star" style="top:25%;left:40%;animation-delay:1.2s"></div>
        <div class="star" style="top:35%;left:85%;animation-delay:2.2s"></div>
        <div class="star" style="top:45%;left:15%;animation-delay:0.3s"></div>
        <div class="star" style="top:55%;left:90%;animation-delay:1.7s"></div>
    </div>
    <div class="mountains">
        <div class="mountain mountain-1"></div>
        <div class="mountain mountain-2"></div>
        <div class="mountain mountain-3"></div>
        <div class="tree tree-1"></div>
        <div class="tree tree-2"></div>
        <div class="tree tree-3"></div>
        <div class="tree tree-4"></div>
    </div>
    <div class="login-container">
        <h2>Login</h2>
        <div th:if="${param.error}" class="message error">Invalid credentials</div>
        <div th:if="${param.logout}" class="message success">You have been logged out successfully</div>
        <div th:if="${success}" class="message success" th:text="${success}"></div>
        
        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autocomplete="username" maxlength="30">
                <span class="input-icon">👤</span>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password" maxlength="128">
                <span class="input-icon">🔒</span>
            </div>
            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" name="remember-me">
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="register-link">
            Don't have an account? <a th:href="@{/register}">Register</a>
        </div>
    </div>
</body>
</html>
