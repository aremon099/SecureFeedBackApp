<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Secure Feedback App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 45px 35px;
            width: 470px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            color: white;
            text-align: center;
            font-size: 36px;
            margin-bottom: 12px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .note {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            text-align: center;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.3);
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            color: white;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.65);
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
        }

        .input-group select option {
            color: black;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: 22px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star" style="top:10%;left:20%;animation-delay:0s"></div>
        <div class="star" style="top:18%;left:75%;animation-delay:1s"></div>
        <div class="star" style="top:30%;left:50%;animation-delay:2s"></div>
        <div class="star" style="top:42%;left:15%;animation-delay:0.5s"></div>
        <div class="star" style="top:58%;left:82%;animation-delay:1.5s"></div>
    </div>

    <div class="container">
        <h2>Forgot Password</h2>
        <p class="subtitle">Verify your security questions to continue</p>

        <div class="note">
            Admin accounts cannot reset password here.
        </div>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="input-group">
                <label>Security Question 1</label>
                <select name="securityQuestion1" required>
                    <option value="">Select a question</option>
                    <option value="What is your favourite color?">What is your favourite color?</option>
                    <option value="What is your pet's name?">What is your pet's name?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is your favourite food?">What is your favourite food?</option>
                    <option value="What was your first school name?">What was your first school name?</option>
                    <option value="What is your mother's first name?">What is your mother's first name?</option>
                    <option value="What is your dream job?">What is your dream job?</option>
                </select>
            </div>

            <div class="input-group">
                <label>Answer 1</label>
                <input type="text" name="securityAnswer1" required>
            </div>

            <div class="input-group">
                <label>Security Question 2</label>
                <select name="securityQuestion2" required>
                    <option value="">Select a question</option>
                    <option value="What is your favourite color?">What is your favourite color?</option>
                    <option value="What is your pet's name?">What is your pet's name?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is your favourite food?">What is your favourite food?</option>
                    <option value="What was your first school name?">What was your first school name?</option>
                    <option value="What is your mother's first name?">What is your mother's first name?</option>
                    <option value="What is your dream job?">What is your dream job?</option>
                </select>
            </div>

            <div class="input-group">
                <label>Answer 2</label>
                <input type="text" name="securityAnswer2" required>
            </div>

            <button type="submit" class="btn">Verify</button>
        </form>

        <div class="back-link">
            <a th:href="@{/login}">Back to Login</a>
        </div>
    </div>
</body>
</html>
