<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Secure Feedback App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 45px 35px;
            width: 420px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            color: white;
            text-align: center;
            font-size: 36px;
            margin-bottom: 15px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.3);
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: white;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }

        .input-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .password-note {
            color: rgba(255,255,255,0.95);
            font-size: 13px;
            margin-top: -6px;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .hidden-input {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: 22px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.6);
        }

        .back-link a:hover {
            opacity: 0.85;
        }

        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
            }

            h2 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star" style="top:10%;left:20%;animation-delay:0s"></div>
        <div class="star" style="top:18%;left:75%;animation-delay:1s"></div>
        <div class="star" style="top:30%;left:50%;animation-delay:2s"></div>
        <div class="star" style="top:42%;left:15%;animation-delay:0.5s"></div>
        <div class="star" style="top:58%;left:82%;animation-delay:1.5s"></div>
        <div class="star" style="top:70%;left:35%;animation-delay:2.5s"></div>
    </div>

    <div class="container">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your new strong password below</p>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="username" th:value="${username}" class="hidden-input">

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <input type="password"
                       id="newPassword"
                       name="newPassword"
                       placeholder="Enter strong new password"
                       required
                       minlength="8"
                       pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&amp;#^()_+\-={}[\]:;&quot;'&lt;&gt;,.\/~`|\\]).{8,}$"
                       title="At least 8 characters, including uppercase, lowercase, number, and special character">
            </div>
            <p class="password-note">
                Password must be at least 8 characters and include uppercase, lowercase, number, and special character.
            </p>
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       placeholder="Confirm new password"
                       required
                       minlength="8">
            </div>

            <button type="submit" class="btn">Reset Password</button>
        </form>

        <div class="back-link">
            <a th:href="@{/login}">Back to Login</a>
        </div>
    </div>
</body>
</html>
