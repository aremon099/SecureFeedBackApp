<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Feedback App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            width: 420px;
            max-width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 {
            color: white;
            text-align: center;
            font-size: 48px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            color: white;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .success {
            background: rgba(34, 197, 94, 0.2);
            color: #bbf7d0;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .forgot-password {
            display: block;
            text-align: right;
            margin-top: -8px;
            margin-bottom: 22px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password:hover {
            opacity: 0.85;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: white;
            font-size: 15px;
        }

        .register-link a {
            color: white;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <p class="subtitle">Sign in to continue</p>

        <div th:if="${param.error}" class="message error">
            Invalid credentials
        </div>

        <div th:if="${param.logout}" class="message success">
            You have been logged out successfully
        </div>

        <div th:if="${success}" class="message success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <a th:href="@{/forgot-password}" class="forgot-password">Forgot password?</a>

            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? <a th:href="@{/register}">Register</a>
        </div>
    </div>
</body>
</html>
