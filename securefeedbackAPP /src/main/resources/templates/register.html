<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; padding: 40px 20px; position: relative;
        }
        .register-container {
            position: relative; z-index: 10; background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px); border-radius: 20px; padding: 50px 40px;
            width: 500px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h2 { color: white; text-align: center; font-size: 42px; margin-bottom: 10px; font-weight: 600; }
        .subtitle { color: rgba(255,255,255,0.9); text-align: center; font-size: 15px; margin-bottom: 30px; }
        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group label { display: block; color: white; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .input-group input,
        .input-group select {
            width: 100%; padding: 13px 18px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px; background: rgba(255,255,255,0.1); color: white;
            font-size: 15px; transition: all 0.3s;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.6); }
        .input-group input:focus,
        .input-group select:focus { outline: none; border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
        .input-group select option { color: black; }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 50px; background: white;
            color: #667eea; font-size: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-top: 10px;
        }
        .login-link { text-align: center; margin-top: 25px; color: white; font-size: 15px; }
        .login-link a { color: white; font-weight: 600; text-decoration: none; border-bottom: 2px solid white; }
        .message { text-align: center; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        .error { background: rgba(239,68,68,0.2); color: #fecaca; border: 1px solid rgba(239,68,68,0.3); }
        .success { background: rgba(34,197,94,0.2); color: #bbf7d0; border: 1px solid rgba(34,197,94,0.3); }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Register</h2>
        <p class="subtitle">Create your account to get started</p>

        <div th:if="${error}" class="message error" th:text="${error}"></div>
        <div th:if="${success}" class="message success" th:text="${success}"></div>

        <form th:action="@{/register}" method="post">
            <div class="name-row">
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Saqib" required maxlength="50">
                </div>

                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" placeholder="hakak" required maxlength="50">
                </div>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="hakak.doe@example.com" required maxlength="100">
            </div>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required maxlength="30">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create password" required maxlength="128">
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required maxlength="128">
            </div>

            <div class="input-group">
                <label for="securityQuestion1">Security Question 1</label>
                <select id="securityQuestion1" name="securityQuestion1" required>
                    <option value="">Select a question</option>
                    <option value="What is your favourite color?">What is your favourite color?</option>
                    <option value="What is your pet's name?">What is your pet's name?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is your favourite food?">What is your favourite food?</option>
                    <option value="What was your first school name?">What was your first school name?</option>
                    <option value="What is your mother's first name?">What is your mother's first name?</option>
                    <option value="What is your dream job?">What is your dream job?</option>
                </select>
            </div>

            <div class="input-group">
                <label for="securityAnswer1">Answer 1</label>
                <input type="text" id="securityAnswer1" name="securityAnswer1" required maxlength="255">
            </div>

            <div class="input-group">
                <label for="securityQuestion2">Security Question 2</label>
                <select id="securityQuestion2" name="securityQuestion2" required>
                    <option value="">Select a question</option>
                    <option value="What is your favourite color?">What is your favourite color?</option>
                    <option value="What is your pet's name?">What is your pet's name?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is your favourite food?">What is your favourite food?</option>
                    <option value="What was your first school name?">What was your first school name?</option>
                    <option value="What is your mother's first name?">What is your mother's first name?</option>
                    <option value="What is your dream job?">What is your dream job?</option>
                </select>
            </div>

            <div class="input-group">
                <label for="securityAnswer2">Answer 2</label>
                <input type="text" id="securityAnswer2" name="securityAnswer2" required maxlength="255">
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a th:href="@{/login}">Login</a>
        </div>
    </div>
</body>
</html>
